# Keycloak OpenID — GeoStore 2.6+ generic OIDC provider configuration.
# Browser and redirects use http://localhost (nginx on :80).
# Backend-only token, userinfo and key endpoints use the host proxy URL from
# inside Docker, avoiding direct dependency on the Keycloak service network name.

oidc_providers=keycloak

keycloakOAuth2Config.enabled=true
keycloakOAuth2Config.clientId=mapstore-server
keycloakOAuth2Config.clientSecret=changeme-mapstore-oidc-client-secret-123
keycloakOAuth2Config.sendClientSecret=true
keycloakOAuth2Config.authorizationUri=http://localhost/keycloak/realms/mapstore/protocol/openid-connect/auth
keycloakOAuth2Config.accessTokenUri=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/token
keycloakOAuth2Config.checkTokenEndpointUrl=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/userinfo
keycloakOAuth2Config.idTokenUri=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/certs
keycloakOAuth2Config.logoutUri=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/logout
keycloakOAuth2Config.revokeEndpoint=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/revoke
keycloakOAuth2Config.introspectionEndpoint=http://host.docker.internal/keycloak/realms/mapstore/protocol/openid-connect/token/introspect
keycloakOAuth2Config.redirectUri=http://localhost/mapstore/rest/geostore/openid/keycloak/callback
keycloakOAuth2Config.internalRedirectUri=http://localhost/mapstore/
keycloakOAuth2Config.globalLogoutEnabled=true
keycloakOAuth2Config.postLogoutRedirectUri=http://localhost/mapstore/
# Keep false when the WAR is in LDAP-direct mode: auto-create tries to sync Keycloak
# users/groups through the LDAP-backed GeoStore DAOs and breaks callback login.
keycloakOAuth2Config.autoCreateUser=false
keycloakOAuth2Config.scopes=openid,profile,email
keycloakOAuth2Config.rolesClaim=realm_access.roles
keycloakOAuth2Config.authenticatedDefaultRole=USER
# Keycloak realm role name -> MapStore role (USER or ADMIN)
keycloakOAuth2Config.roleMappings=admin:ADMIN,user:USER
keycloakOAuth2Config.dropUnmapped=false
