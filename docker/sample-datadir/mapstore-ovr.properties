# Keycloak OpenID — https://docs.mapstore.geosolutionsgroup.com/en/latest/developer-guide/integrations/users/openId/#keycloak
# Browser and redirects use http://localhost (nginx on :80).
# MapStore container reaches the same URLs via extra_hosts localhost:host-gateway.

keycloakOAuth2Config.enabled=true
keycloakOAuth2Config.jsonConfig={"realm":"mapstore","auth-server-url":"http://localhost/keycloak/","ssl-required":"external","resource":"mapstore-server","credentials":{"secret":"changeme-mapstore-oidc-client-secret-123"}}
keycloakOAuth2Config.redirectUri=http://localhost/mapstore/rest/geostore/openid/keycloak/callback
keycloakOAuth2Config.internalRedirectUri=http://localhost/mapstore/
# Keep false when the WAR is in LDAP-direct mode: auto-create tries to sync Keycloak
# users/groups through the LDAP-backed GeoStore DAOs and breaks callback login.
keycloakOAuth2Config.autoCreateUser=false
keycloakOAuth2Config.forceConfiguredRedirectURI=true
keycloakOAuth2Config.authenticatedDefaultRole=USER
# Keycloak realm role name -> MapStore role (USER or ADMIN)
keycloakOAuth2Config.roleMappings=admin:ADMIN
